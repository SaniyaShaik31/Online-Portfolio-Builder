<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login Form</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
}


body, html {
    height: 100%;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    background-image: url(https://img.freepik.com/premium-photo/software-development-conceptcoding-programmer-software-engineer-working-laptop-with-javascript-computer-code-virtual-screen-internet-things-iot-digital-technology-ai-generated_99418-1387.jpg);
    background-size: cover;


}




.login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}




.login-form {
    background-color: white;
    padding: 2rem;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    width: 300px;
    text-align: center;
    background-color: transparent;
}


.login-form h2 {
    margin-bottom: 1.5rem;
}


.login-form input {
    width: 100%;
    padding: 10px;
    margin: 0.5rem 0;
    border: 1px solid #ccc;
    border-radius: 4px;
}


.login-form button {
    width: 100%;
    padding: 10px;
    background-color: #007bff;
    border: none;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 1rem;
    font-size: 16px;
}


.login-form button:hover {
    background-color: #0056b3;
}


    </style>
</head>
<body>
    <div class="login-container">
        <form class="login-form">
            <h2>Login</h2>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit"><a href="home.html">Login</a></button>
        </form>
    </div>
</body>
</html>
